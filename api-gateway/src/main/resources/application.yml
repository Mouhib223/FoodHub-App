
server:
  port: 8080

spring:
  application:
	name: api-gateway
  config:
	import: optional:configserver:http://localhost:8888

  cloud:
	gateway:
	  discovery:
		locator:
		  enabled: true
		  lower-case-service-id: true
	  routes:
		# User Service routes
		- id: user-service
		  uri: lb://user-service
		  predicates:
			- Path=/api/v1/users/**, /api/v1/auth/**
		  filters:
			- StripPrefix=0

		# Restaurant Service routes
		- id: restaurant-service
		  uri: lb://restaurant-service
		  predicates:
			- Path=/api/v1/restaurants/**, /api/v1/menu/**, /api/v1/categories/**
		  filters:
			- StripPrefix=0

		# Order Service routes
		- id: order-service
		  uri: lb://order-service
		  predicates:
			- Path=/api/v1/orders/**, /api/v1/cart/**
		  filters:
			- StripPrefix=0

		# Delivery Service routes
		- id: delivery-service
		  uri: lb://delivery-service
		  predicates:
			- Path=/api/v1/delivery/**, /api/v1/drivers/**
		  filters:
			- StripPrefix=0

		# Recommendation Service routes
		- id: recommendation-service
		  uri: lb://recommendation-service
		  predicates:
			- Path=/api/v1/recommendations/**
		  filters:
			- StripPrefix=0

		# Swagger docs aggregation
		- id: user-service-docs
		  uri: lb://user-service
		  predicates:
			- Path=/user-service/v3/api-docs
		  filters:
			- RewritePath=/user-service/v3/api-docs, /v3/api-docs

		- id: restaurant-service-docs
		  uri: lb://restaurant-service
		  predicates:
			- Path=/restaurant-service/v3/api-docs
		  filters:
			- RewritePath=/restaurant-service/v3/api-docs, /v3/api-docs

		- id: order-service-docs
		  uri: lb://order-service
		  predicates:
			- Path=/order-service/v3/api-docs
		  filters:
			- RewritePath=/order-service/v3/api-docs, /v3/api-docs

		- id: delivery-service-docs
		  uri: lb://delivery-service
		  predicates:
			- Path=/delivery-service/v3/api-docs
		  filters:
			- RewritePath=/delivery-service/v3/api-docs, /v3/api-docs


  security:
	oauth2:
	  resourceserver:
		jwt:
		  issuer-uri: http://localhost:8180/realms/foodhub
		  jwk-set-uri: http://localhost:8180/realms/foodhub/protocol/openid-connect/certs

eureka:
  client:
	service-url:
	  defaultZone: http://admin:admin123@localhost:8761/eureka/
  instance:
	prefer-ip-address: true

springdoc:
  swagger-ui:
	path: /swagger-ui.html
  api-docs:
	path: /v3/api-docs

management:
  endpoints:
	web:
	  exposure:
		include: health,info,gateway,prometheus
  metrics:
	export:
	  prometheus:
		enabled: true

logging:
  level:
	org.springframework.cloud.gateway: DEBUG
