spring:
  application:
	name: restaurant-service
  config:
	import: optional:configserver:http://localhost:8888
  jpa:
	open-in-view: false

  security:
	oauth2:
	  resourceserver:
		jwt:
		  issuer-uri: http://localhost:8180/realms/foodhub
		  jwk-set-uri: http://localhost:8180/realms/foodhub/protocol/openid-connect/certs

eureka:
  client:
	service-url:
	  defaultZone: http://admin:admin123@localhost:8761/eureka/
  instance:
	prefer-ip-address: true

springdoc:
  api-docs:
	path: /v3/api-docs
  swagger-ui:
	path: /swagger-ui.html

logging:
  level:
	com.foodhub: DEBUG
