server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/foodhub_users
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

keycloak:
  realm: foodhub
  auth-server-url: http://localhost:8180
  resource: user-service
  credentials:
    secret: user-service-secret

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
