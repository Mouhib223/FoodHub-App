server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3307/foodhub_restaurants
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
