name: FoodHub CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Eureka Server
        run: cd eureka-server && mvn clean package -DskipTests

      - name: Build Config Server
        run: cd config-server && mvn clean package -DskipTests

      - name: Build API Gateway
        run: cd api-gateway && mvn clean package -DskipTests

      - name: Build User Service
        run: cd user-service && mvn clean package -DskipTests

      - name: Build Restaurant Service
        run: cd restaurant-service && mvn clean package -DskipTests

      - name: Build Order Service
        run: cd order-service && mvn clean package -DskipTests

      - name: Build Delivery Service
        run: cd delivery-service && mvn clean package -DskipTests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build NestJS Recommendation Service
        run: |
          cd recommendation-service
          npm ci
          npm run build

      - name: Build Angular Frontend
        run: |
          cd frontend/foodhub-frontend
          npm ci
          npm run build -- --configuration=production

  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up JDK 21 for Maven builds
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build all Spring Boot jars
        run: |
          for svc in eureka-server config-server api-gateway user-service restaurant-service order-service delivery-service; do
            cd $svc && mvn clean package -DskipTests && cd ..
          done

      - name: Build and push all Docker images
        run: |
          services=("eureka-server" "config-server" "api-gateway" "user-service" "restaurant-service" "order-service" "delivery-service")
          for svc in "${services[@]}"; do
            docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/foodhub-$svc:latest ./$svc
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/foodhub-$svc:latest
          done

          # NestJS
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/foodhub-recommendation-service:latest ./recommendation-service
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/foodhub-recommendation-service:latest

          # Frontend
          cd frontend/foodhub-frontend
          npm ci && npm run build -- --configuration=production && cd ../..
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/foodhub-frontend:latest ./frontend/foodhub-frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/foodhub-frontend:latest

